<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multitrack Player</title>

<script src="https://unpkg.com/wavesurfer.js@6"></script>

<style>

body{
font-family:Arial;
max-width:1000px;
margin:auto;
padding:40px;
}

.track{
margin-bottom:35px;
padding:10px;
border-bottom:1px solid #ddd;
}

.wave{
height:120px;
margin-top:5px;
}

.controls{
display:flex;
align-items:center;
gap:10px;
margin-top:5px;
}

.volume{
width:150px;
}

</style>

</head>

<body>

<h2>Multitrack Player</h2>

<button onclick="playAll()">Play</button>
<button onclick="pauseAll()">Pause</button>

<div id="tracks"></div>

<script>

const tracks=[

{ name:"Drums", file:"drums.mp3", type:"instrument"},
{ name:"Click", file:"click.mp3", type:"click"},
{ name:"Cues", file:"cues.mp3", type:"click"},
{ name:"Guitar", file:"guitar.mp3", type:"instrument"},
{ name:"AG2", file:"ag2.mp3", type:"instrument"}

]

let players=[]
let soloIndex=null

tracks.forEach((track,i)=>{

const color=track.type==="click" ? "#ff5555" : "#4aa3ff"

const div=document.createElement("div")

div.className="track"

div.innerHTML=`

<h4>${track.name}</h4>

<div class="controls">

<button id="solo${i}">Solo</button>
<button id="mute${i}">Mute</button>

<label>Vol</label>
<input type="range" min="0" max="1" step="0.01" value="1"
class="volume" id="vol${i}">

</div>

<div id="wave${i}" class="wave"></div>

`

document.getElementById("tracks").appendChild(div)

const ws=WaveSurfer.create({

container:"#wave"+i,
backend:"MediaElement",
waveColor:color,
progressColor:"#000",
height:120

})

ws.load(track.file)

players.push(ws)

document.getElementById("solo"+i).onclick=()=>toggleSolo(i)

document.getElementById("mute"+i).onclick=()=>{

if(ws.getVolume()>0){
ws.setVolume(0)
}else{
ws.setVolume(1)
}

}

document.getElementById("vol"+i).oninput=(e)=>{

ws.setVolume(e.target.value)

}

})

function playAll(){

players.forEach(p=>p.play())

}

function pauseAll(){

players.forEach(p=>p.pause())

}

function toggleSolo(i){

if(soloIndex===i){

players.forEach(p=>p.setVolume(1))
soloIndex=null

}else{

players.forEach((p,index)=>{

p.setVolume(index===i?1:0)

})

soloIndex=i

}

}

</script>

</body>
</html>
