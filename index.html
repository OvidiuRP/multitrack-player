<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multitrack Check</title>

<script src="https://unpkg.com/wavesurfer.js@6"></script>

<style>

body{
font-family:Arial;
max-width:1300px;
margin:auto;
padding:30px;
}

#topbar{

display:flex;
justify-content:space-between;
align-items:center;

}

#transport{

text-align:center;
margin-top:10px;

}

button{

padding:6px 14px;
margin:4px;

}

#waveform{

height:180px;
border:3px solid #777;
margin-top:20px;

}

.trackWave{

opacity:0.2;

}

.trackWave.solo{

opacity:1;

}

#mixer{

display:flex;
flex-wrap:wrap;
gap:12px;
margin-top:30px;

}

.channel{

border:2px solid #4a7bd6;
padding:8px;
width:90px;
text-align:center;

}

.channel.click{

border-color:#d64040;

}

.channel.solo{

border-color:#ff8800;

}

.faderWrap{

display:flex;
align-items:center;
justify-content:center;
gap:4px;

}

.scale{

font-size:10px;
text-align:right;

}

.scale div{

height:18px;

}

.fader{

appearance:none;
width:26px;
height:120px;
writing-mode:bt-lr;

}

.fader::-webkit-slider-thumb{

appearance:none;
background:#444;
width:24px;
height:8px;

}

.buttons{

display:flex;
justify-content:center;
gap:4px;
margin-top:8px;

}

#master{

text-align:right;

}

#master input{

width:200px;

}

</style>
</head>

<body>

<div id="topbar">

<h2>Multitrack Check</h2>

<div id="master">

Master Volume<br>
<input type="range" min="0" max="1" step="0.01" value="1" id="masterVol">

</div>

</div>

<div id="transport">

<button id="play">Play</button>
<button id="pause">Pause</button>
<button id="stop">Stop</button>

</div>

<div id="waveform"></div>

<div id="mixer"></div>

<script>

const files=[
"Click.mp3",
"Cues.mp3",
"Ag2.mp3",
"drums.mp3",
"guitar.mp3"
]

let waves=[]
let audio=[]
let trackVolume=[]
let trackMuted=[]
let soloTrack=null
let masterVolume=1
let isPlaying=false

files.forEach((file,i)=>{

const name=file.replace(".mp3","")

trackVolume[i]=1
trackMuted[i]=false

const ws=WaveSurfer.create({

container:"#waveform",
height:180,
waveColor:"#7aa8ff",
progressColor:"#000",
normalize:true,
responsive:true

})

ws.load(file)

ws.container.classList.add("trackWave")

waves.push(ws)

const a=new Audio(file)

audio.push(a)

const ch=document.createElement("div")

ch.className="channel"

if(name.toLowerCase()=="click"||name.toLowerCase()=="cues"){

ch.classList.add("click")

}

ch.innerHTML=`

<div>${name}</div>

<div class="faderWrap">

<div class="scale">

<div>100%</div>
<div>75%</div>
<div>50%</div>
<div>25%</div>
<div>0%</div>

</div>

<input type="range" min="0" max="1" step="0.01" value="1" class="fader" id="vol${i}">

</div>

<div class="buttons">

<button id="mute${i}">M</button>
<button id="solo${i}">S</button>

</div>

`

document.getElementById("mixer").appendChild(ch)

document.getElementById("vol"+i).oninput=e=>{

trackVolume[i]=parseFloat(e.target.value)
updateVolume(i)

}

document.getElementById("mute"+i).onclick=()=>{

trackMuted[i]=!trackMuted[i]
updateVolume(i)

}

document.getElementById("solo"+i).onclick=()=>{

toggleSolo(i)

}

})

function updateVolume(i){

if(trackMuted[i]){

audio[i].volume=0

}else{

audio[i].volume=trackVolume[i]*masterVolume

}

}

function toggleSolo(i){

soloTrack=i

waves.forEach((w,index)=>{

w.container.classList.remove("solo")

})

waves[i].container.classList.add("solo")

}

function play(){

audio.forEach(a=>a.play())
waves.forEach(w=>w.play())

isPlaying=true

}

function pause(){

audio.forEach(a=>a.pause())
waves.forEach(w=>w.pause())

isPlaying=false

}

function stop(){

audio.forEach(a=>{

a.pause()
a.currentTime=0

})

waves.forEach(w=>w.stop())

isPlaying=false

}

function seekStart(){

audio.forEach(a=>a.currentTime=0)

waves.forEach(w=>w.seekTo(0))

}

document.getElementById("play").onclick=play
document.getElementById("pause").onclick=pause
document.getElementById("stop").onclick=stop

document.addEventListener("keydown",e=>{

if(e.code==="Space"){

e.preventDefault()

if(isPlaying){

pause()

}else{

play()

}

}

if(e.code==="Enter"){

if(isPlaying){

seekStart()
play()

}else{

seekStart()

}

}

})

document.getElementById("masterVol").oninput=e=>{

masterVolume=parseFloat(e.target.value)

audio.forEach((a,i)=>{

updateVolume(i)

})

}

</script>

</body>
</html>
