<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multitrack Check</title>

<script src="https://unpkg.com/wavesurfer.js"></script>

<style>

body{
font-family:Arial;
background:#2f2f2f;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

.transport{
margin:20px;
}

button{
padding:10px 16px;
margin:5px;
font-size:14px;
border:none;
border-radius:6px;
cursor:pointer;
}

#play{background:#2ecc71;}
#pause{background:#f1c40f;}
#stop{background:#e74c3c;}

#waveform{
width:90%;
height:120px;
margin:auto;
background:#444;
border-radius:6px;
}

.master{
width:300px;
margin:auto;
margin-top:10px;
}

.master input{
width:100%;
}

.tracks{
width:90%;
margin:auto;
margin-top:25px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}

.track{
background:#3a3a3a;
padding:8px;
border-radius:6px;
}

.track.click{
border:2px solid red;
}

.track.solo{
border:2px solid orange;
}

.track-name{
font-size:12px;
margin-bottom:6px;
}

.fader{
height:90px;
}

.controls{
display:flex;
justify-content:center;
gap:4px;
margin-top:5px;
}

.controls button{
font-size:11px;
padding:3px 6px;
}

.mute.active{
background:red;
}

.solo.active{
background:orange;
}

.scale{
font-size:9px;
line-height:1.1;
margin-left:3px;
}

.faderbox{
display:flex;
justify-content:center;
}

</style>
</head>

<body>

<h1>Multitrack Check</h1>

<div class="transport">
<button id="play">Play</button>
<button id="pause">Pause</button>
<button id="stop">Stop</button>
</div>

<div class="master">
Master Volume
<input id="masterVolume" type="range" min="0" max="1" step="0.01" value="1">
</div>

<div id="waveform"></div>

<div class="tracks" id="tracks"></div>

<script>

let wavesurfer=WaveSurfer.create({
container:"#waveform",
waveColor:"#777",
progressColor:"#fff",
cursorColor:"#fff",
height:120
})

let tracks=[]
let audioNodes=[]

fetch("tracks.json")
.then(r=>r.json())
.then(list=>init(list))

function init(list){

list.sort((a,b)=>{

let A=a.toLowerCase()
let B=b.toLowerCase()

if(A.includes("click"))return -1
if(B.includes("click"))return 1

if(A.includes("cues"))return -1
if(B.includes("cues"))return 1

return A.localeCompare(B)

})

const container=document.getElementById("tracks")

list.forEach(file=>{

let name=file.replace(".mp3","")

let audio=new Audio("audio/"+file)
audio.loop=false

let track=document.createElement("div")
track.className="track"

if(name.toLowerCase().includes("click")||name.toLowerCase().includes("cues")){
track.classList.add("click")
}

track.innerHTML=`

<div class="track-name">${name}</div>

<div class="faderbox">

<input class="fader" type="range" min="0" max="1" step="0.01" value="1" orient="vertical">

<div class="scale">
100%<br>
75%<br>
50%<br>
25%<br>
0%
</div>

</div>

<div class="controls">
<button class="mute">M</button>
<button class="solo">S</button>
</div>

`

container.appendChild(track)

let fader=track.querySelector(".fader")
let muteBtn=track.querySelector(".mute")
let soloBtn=track.querySelector(".solo")

fader.oninput=()=>{
audio.volume=fader.value
}

muteBtn.onclick=()=>{
muteBtn.classList.toggle("active")
audio.muted=muteBtn.classList.contains("active")
}

soloBtn.onclick=()=>{

soloBtn.classList.toggle("active")
track.classList.toggle("solo")

updateSolo()

}

tracks.push({
audio,
track,
soloBtn
})

audioNodes.push(audio)

})

}

function updateSolo(){

let solos=tracks.filter(t=>t.soloBtn.classList.contains("active"))

if(solos.length==0){

tracks.forEach(t=>{
t.audio.muted=false
})

}else{

tracks.forEach(t=>{
t.audio.muted=!t.soloBtn.classList.contains("active")
})

}

}

function playAll(){

audioNodes.forEach(a=>{
a.currentTime=wavesurfer.getCurrentTime()
a.play()
})

wavesurfer.play()

}

function pauseAll(){

audioNodes.forEach(a=>a.pause())
wavesurfer.pause()

}

function stopAll(){

audioNodes.forEach(a=>{
a.pause()
a.currentTime=0
})

wavesurfer.stop()

}

document.getElementById("play").onclick=playAll
document.getElementById("pause").onclick=pauseAll
document.getElementById("stop").onclick=stopAll

document.getElementById("masterVolume").oninput=e=>{

audioNodes.forEach(a=>{
a.volume=e.target.value
})

}

document.addEventListener("keydown",e=>{

if(e.code==="Space"){

e.preventDefault()

if(wavesurfer.isPlaying())pauseAll()
else playAll()

}

if(e.code==="Enter"){

if(wavesurfer.isPlaying()){
stopAll()
playAll()
}else{
stopAll()
}

}

})

</script>

</body>
</html>
