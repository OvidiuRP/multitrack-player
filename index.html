<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multitrack Player</title>

<script src="https://unpkg.com/wavesurfer.js@6"></script>

<style>

body{
font-family: Arial;
max-width:900px;
margin:auto;
padding:40px;
}

.track{
margin-bottom:30px;
}

.wave{
height:140px;
}

button{
margin-right:10px;
}

</style>

</head>

<body>

<h2>Multitrack Player</h2>

<button onclick="playAll()">Play</button>
<button onclick="pauseAll()">Pause</button>

<div id="tracks"></div>

<script>

const tracks = [

{ name:"Drums", file:"drums.mp3", type:"instrument" },
{ name:"Click", file:"click.mp3", type:"click" },
{ name:"Cues", file:"cues.mp3", type:"click" },
{ name:"Guitar", file:"guitar.mp3", type:"instrument" },
{ name:"AG2", file:"ag2.mp3", type:"instrument" }

]

let players=[]
let soloIndex=null

tracks.forEach((track,i)=>{

const color = track.type==="click" ? "#ff5a5a" : "#4aa3ff"

const div=document.createElement("div")

div.className="track"

div.innerHTML=`

<h4>${track.name}</h4>

<button onclick="toggleSolo(${i})">Solo</button>
<button onclick="mute(${i})">Mute</button>

<div id="wave${i}" class="wave"></div>

`

document.getElementById("tracks").appendChild(div)

const ws = WaveSurfer.create({

container:"#wave"+i,
waveColor:color,
progressColor:"#000",
height:140,
responsive:true

})

ws.load(track.file)

players.push(ws)

})

function playAll(){
players.forEach(p=>p.play())
}

function pauseAll(){
players.forEach(p=>p.pause())
}

function mute(i){
players[i].setVolume(0)
}

function toggleSolo(i){

if(soloIndex===i){

players.forEach(p=>p.setVolume(1))
soloIndex=null

}else{

players.forEach((p,index)=>{
p.setVolume(index===i?1:0)
})

soloIndex=i

}

}

</script>

</body>
</html>
