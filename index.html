<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multitrack Check</title>

<script src="https://unpkg.com/wavesurfer.js"></script>

<style>

body{
font-family:Arial;
background:#3a3a3a;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

.transport{
margin:20px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

#play{background:#27ae60}
#pause{background:#f1c40f}
#stop{background:#e74c3c}

#waveform{
width:90%;
height:140px;
margin:auto;
background:#555;
border-radius:6px;
}

.tracks{
width:90%;
margin:auto;
margin-top:25px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.track{
background:#444;
padding:10px;
border-radius:6px;
width:120px;
}

.track.click{
border:2px solid red;
}

.track.solo{
border:2px solid orange;
}

.track-name{
font-size:12px;
margin-bottom:8px;
}

.controls{
display:flex;
justify-content:center;
gap:6px;
}

.controls button{
font-size:11px;
padding:4px 6px;
}

.fader{
width:100%;
margin-top:8px;
}

</style>
</head>

<body>

<h1>Multitrack Check</h1>

<div class="transport">
<button id="play">Play</button>
<button id="pause">Pause</button>
<button id="stop">Stop</button>
</div>

<div id="waveform"></div>

<div class="tracks" id="tracks"></div>

<script>

let wavesurfer = WaveSurfer.create({
container:"#waveform",
waveColor:"#999",
progressColor:"#fff",
cursorColor:"#fff",
height:120
})

let tracks=[]
let audios=[]

fetch("tracks.json")
.then(r=>r.json())
.then(list=>init(list))

function init(list){

const container=document.getElementById("tracks")

list.forEach((file,i)=>{

let name=file.replace(".mp3","")

let audio=new Audio("audio/"+file)

if(i==0){
wavesurfer.load("audio/"+file)
}

let div=document.createElement("div")
div.className="track"

if(name.toLowerCase().includes("click")||name.toLowerCase().includes("cues")){
div.classList.add("click")
}

div.innerHTML=`

<div class="track-name">${name}</div>

<div class="controls">
<button class="mute">Mute</button>
<button class="solo">Solo</button>
</div>

<input class="fader" type="range" min="0" max="1" step="0.01" value="1">

`

container.appendChild(div)

let muteBtn=div.querySelector(".mute")
let soloBtn=div.querySelector(".solo")
let fader=div.querySelector(".fader")

muteBtn.onclick=()=>{
audio.muted=!audio.muted
muteBtn.style.background=audio.muted?"red":""
}

soloBtn.onclick=()=>{
div.classList.toggle("solo")
soloBtn.classList.toggle("active")
updateSolo()
}

fader.oninput=()=>{
audio.volume=fader.value
}

tracks.push({audio,soloBtn})
audios.push(audio)

})

}

function updateSolo(){

let solos=tracks.filter(t=>t.soloBtn.classList.contains("active"))

if(solos.length==0){

tracks.forEach(t=>t.audio.muted=false)

}else{

tracks.forEach(t=>{
t.audio.muted=!t.soloBtn.classList.contains("active")
})

}

}

function playAll(){

let time=wavesurfer.getCurrentTime()

audios.forEach(a=>{
a.currentTime=time
a.play()
})

wavesurfer.play()

}

function pauseAll(){

audios.forEach(a=>a.pause())
wavesurfer.pause()

}

function stopAll(){

audios.forEach(a=>{
a.pause()
a.currentTime=0
})

wavesurfer.stop()

}

document.getElementById("play").onclick=playAll
document.getElementById("pause").onclick=pauseAll
document.getElementById("stop").onclick=stopAll

document.addEventListener("keydown",e=>{

if(e.code==="Space"){

e.preventDefault()

if(wavesurfer.isPlaying())pauseAll()
else playAll()

}

if(e.code==="Enter"){

if(wavesurfer.isPlaying()){
stopAll()
playAll()
}else{
stopAll()
}

}

})

</script>

</body>
</html>
