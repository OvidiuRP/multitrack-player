<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multitrack Check</title>

<script src="https://unpkg.com/wavesurfer.js@6"></script>

<style>

body{
font-family:Arial;
max-width:1300px;
margin:auto;
padding:40px;
}

#header{
text-align:center;
}

#waveform{
height:180px;
border:3px solid #888;
margin-top:20px;
}

#transport button{
padding:8px 16px;
margin:6px;
cursor:pointer;
}

#transport button.active{
background:#222;
color:white;
}

#mixer{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:30px;
}

.channel{

border:2px solid #3a7bd5;
width:90px;
padding:6px;
text-align:center;

}

.channel.click{
border-color:#c63b3b;
}

.channel.solo{
border-color:#ff8800;
}

.channel-name{
font-size:12px;
margin-bottom:6px;
}

.fader{

writing-mode:bt-lr;
-webkit-appearance:slider-vertical;
height:100px;
width:24px;

}

.scale{

font-size:9px;
line-height:18px;

}

.buttons{

display:flex;
justify-content:center;
gap:4px;
margin-top:6px;

}

.buttons button{

font-size:10px;
padding:2px 6px;

}

button.solo-active{

background:#ff8800;
color:white;

}

#master{

margin-top:30px;
}

#master input{

width:300px;

}

#highlight{

position:absolute;
height:180px;
width:100%;
background:rgba(255,136,0,0.2);
pointer-events:none;
display:none;

}

#wave-container{
position:relative;
}

</style>
</head>

<body>

<div id="header">

<h2>Multitrack Check</h2>

<div id="transport">

<button id="play">Play</button>
<button id="pause">Pause</button>
<button id="stop">Stop</button>

</div>

</div>

<div id="wave-container">

<div id="waveform"></div>
<div id="highlight"></div>

</div>

<div id="mixer"></div>

<div id="master">

Master Volume

<br>

<input id="masterVol" type="range" min="0" max="1" step="0.01" value="1">

</div>

<script>

const files=[
"Click.mp3",
"Cues.mp3",
"Ag2.mp3",
"drums.mp3",
"guitar.mp3"
]

let audio=[]
let soloIndex=null
let isPlaying=false

const wavesurfer=WaveSurfer.create({

container:"#waveform",
height:180,
waveColor:"#6aa8ff",
progressColor:"#000"

})

wavesurfer.load(files[0])

files.forEach((f,i)=>{

const name=f.replace(".mp3","")

const a=new Audio(f)

audio.push(a)

const div=document.createElement("div")

div.className="channel"

if(name.toLowerCase()=="click" || name.toLowerCase()=="cues"){

div.classList.add("click")

}

div.innerHTML=`

<div class="channel-name">${name}</div>

<input type="range" class="fader" min="0" max="1" step="0.01" value="1" id="vol${i}">

<div class="scale">

100<br>
75<br>
50<br>
25<br>
0

</div>

<div class="buttons">

<button id="mute${i}">M</button>
<button id="solo${i}">S</button>

</div>

`

document.getElementById("mixer").appendChild(div)

document.getElementById("vol"+i).oninput=(e)=>{

audio[i].volume=e.target.value

}

document.getElementById("mute"+i).onclick=()=>{

if(audio[i].volume>0){

audio[i].volume=0

}else{

audio[i].volume=1

}

}

document.getElementById("solo"+i).onclick=()=>{

toggleSolo(i)

}

})

function toggleSolo(i){

if(soloIndex===i){

audio.forEach(a=>a.volume=1)

document.getElementById("highlight").style.display="none"

soloIndex=null

}else{

audio.forEach((a,index)=>{

a.volume=index===i?1:0

})

soloIndex=i

document.getElementById("highlight").style.display="block"

}

}

function play(){

audio.forEach(a=>a.play())

wavesurfer.play()

isPlaying=true

}

function pause(){

audio.forEach(a=>a.pause())

wavesurfer.pause()

isPlaying=false

}

function stop(){

audio.forEach(a=>{

a.pause()
a.currentTime=0

})

wavesurfer.stop()

isPlaying=false

}

document.getElementById("play").onclick=play
document.getElementById("pause").onclick=pause
document.getElementById("stop").onclick=stop

document.addEventListener("keydown",(e)=>{

if(e.code==="Space"){

e.preventDefault()

if(isPlaying){

pause()

}else{

play()

}

}

if(e.code==="Enter"){

if(isPlaying){

stop()
play()

}else{

stop()

}

}

})

document.getElementById("masterVol").oninput=(e)=>{

const v=e.target.value

audio.forEach(a=>{

a.volume=a.volume*v

})

}

wavesurfer.on("seek",(p)=>{

const t=wavesurfer.getDuration()*p

audio.forEach(a=>a.currentTime=t)

})

</script>

</body>
</html>
