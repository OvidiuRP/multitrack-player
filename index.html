<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multitrack Check</title>

<script src="https://unpkg.com/wavesurfer.js@6"></script>

<style>

body{
font-family:Arial;
background:#e5e5e5;
max-width:1200px;
margin:auto;
padding:30px;
}

#header{
text-align:center;
}

#transport button{
padding:8px 16px;
margin:5px;
cursor:pointer;
}

#waveform{
height:180px;
border:3px solid #666;
margin-top:20px;
background:#ddd;
}

#mixer{
display:flex;
flex-wrap:wrap;
gap:12px;
margin-top:25px;
}

.channel{
border:2px solid #4a7bd6;
padding:8px;
width:90px;
text-align:center;
background:#f5f5f5;
}

.channel.click{
border-color:#d64040;
}

.channel.solo{
border-color:#ff8800;
}

.faderWrap{
display:flex;
justify-content:center;
gap:4px;
}

.scale{
font-size:10px;
text-align:right;
}

.scale div{
height:20px;
}

.fader{
appearance:none;
height:120px;
width:28px;
writing-mode:bt-lr;
}

.fader::-webkit-slider-thumb{
appearance:none;
background:#444;
width:24px;
height:8px;
}

.buttons{
display:flex;
justify-content:center;
gap:4px;
margin-top:6px;
}

#topRow{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
}

#master{
text-align:right;
}

#master input{
width:180px;
}

</style>
</head>

<body>

<div id="header">

<h2>Multitrack Check</h2>

<div id="topRow">

<div id="transport">
<button id="play">Play</button>
<button id="pause">Pause</button>
<button id="stop">Stop</button>
</div>

<div id="master">
Master Volume<br>
<input type="range" min="0" max="1" step="0.01" value="1" id="masterVol">
</div>

</div>

</div>

<div id="waveform"></div>

<div id="mixer"></div>

<script>

const files=[
"Click.mp3",
"Cues.mp3",
"Ag2.mp3",
"drums.mp3",
"guitar.mp3"
]

let audio=[]
let volume=[]
let muted=[]
let master=1
let solo=null
let isPlaying=false

const wave=WaveSurfer.create({

container:"#waveform",
waveColor:"#7fa9ff",
progressColor:"#222",
height:180,
normalize:true,
responsive:true

})

wave.load(files[0])

files.forEach((file,i)=>{

const name=file.replace(".mp3","")

const a=new Audio(file)

audio.push(a)

volume[i]=1
muted[i]=false

const div=document.createElement("div")
div.className="channel"

if(name.toLowerCase()=="click"||name.toLowerCase()=="cues"){
div.classList.add("click")
}

div.innerHTML=`

<div>${name}</div>

<div class="faderWrap">

<div class="scale">
<div>100%</div>
<div>75%</div>
<div>50%</div>
<div>25%</div>
<div>0%</div>
</div>

<input type="range" min="0" max="1" step="0.01" value="1" class="fader" id="vol${i}">

</div>

<div class="buttons">

<button id="mute${i}">M</button>
<button id="solo${i}">S</button>

</div>

`

document.getElementById("mixer").appendChild(div)

document.getElementById("vol"+i).oninput=e=>{
volume[i]=parseFloat(e.target.value)
updateVolume(i)
}

document.getElementById("mute"+i).onclick=()=>{
muted[i]=!muted[i]
updateVolume(i)
}

document.getElementById("solo"+i).onclick=()=>{

solo=i

document.querySelectorAll(".channel").forEach(c=>c.classList.remove("solo"))

div.classList.add("solo")

audio.forEach((a,index)=>{
a.volume=index===i?volume[i]*master:0
})

}

})

function updateVolume(i){

if(muted[i]){

audio[i].volume=0

}else{

audio[i].volume=volume[i]*master

}

}

function play(){

audio.forEach(a=>a.play())
wave.play()

isPlaying=true

}

function pause(){

audio.forEach(a=>a.pause())
wave.pause()

isPlaying=false

}

function stop(){

audio.forEach(a=>{
a.pause()
a.currentTime=0
})

wave.stop()

isPlaying=false

}

function restart(){

audio.forEach(a=>{
a.currentTime=0
})

wave.seekTo(0)

}

document.getElementById("play").onclick=play
document.getElementById("pause").onclick=pause
document.getElementById("stop").onclick=stop

document.getElementById("masterVol").oninput=e=>{

master=parseFloat(e.target.value)

audio.forEach((a,i)=>updateVolume(i))

}

document.addEventListener("keydown",e=>{

if(e.code==="Space"){

e.preventDefault()

if(isPlaying){
pause()
}else{
play()
}

}

if(e.code==="Enter"){

if(isPlaying){
restart()
play()
}else{
restart()
}

}

})

wave.on("seek",p=>{

const t=wave.getDuration()*p

audio.forEach(a=>a.currentTime=t)

})

</script>

</body>
</html>
