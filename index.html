<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multitrack Player</title>

<script src="https://unpkg.com/wavesurfer.js@6"></script>

<style>

body{
font-family:Arial;
max-width:1000px;
margin:auto;
padding:40px;
}

#waveform{
height:200px;
margin-bottom:40px;
}

.track{
display:flex;
align-items:center;
gap:10px;
margin-bottom:12px;
}

button{
padding:6px 12px;
cursor:pointer;
border:none;
background:#ddd;
}

button.active{
background:#222;
color:white;
}

.volume{
width:120px;
}

.highlight{
outline:4px solid #ff8800;
}

</style>
</head>

<body>

<h2>Multitrack Player</h2>

<div>

<button id="playBtn">Play</button>
<button id="pauseBtn">Pause</button>
<button id="stopBtn">Stop</button>

</div>

<div id="waveform"></div>

<div id="mixer"></div>

<script>

const tracks=[

"drums.mp3",
"Click.mp3",
"Cues.mp3",
"guitar.mp3",
"Ag2.mp3"

]

let audioTracks=[]
let soloIndex=null

const wavesurfer = WaveSurfer.create({

container:"#waveform",
waveColor:"#4aa3ff",
progressColor:"#000",
height:200,
backend:"MediaElement"

})

wavesurfer.load(tracks[0]) // folosim primul track pentru waveform

const mixer=document.getElementById("mixer")

tracks.forEach((file,i)=>{

const name=file.replace(".mp3","")

const audio=new Audio(file)

audioTracks.push(audio)

const div=document.createElement("div")
div.className="track"

div.innerHTML=`

<span style="width:120px">${name}</span>

<button id="solo${i}">Solo</button>
<button id="mute${i}">Mute</button>

<label>Vol</label>
<input type="range" min="0" max="1" step="0.01" value="1"
class="volume" id="vol${i}">

`

mixer.appendChild(div)

document.getElementById("solo"+i).onclick=()=>toggleSolo(i)
document.getElementById("mute"+i).onclick=()=>toggleMute(i)

document.getElementById("vol"+i).oninput=(e)=>{

audio.volume=e.target.value

}

})

wavesurfer.on("seek",(progress)=>{

const time=wavesurfer.getDuration()*progress

audioTracks.forEach(a=>{

a.currentTime=time

})

})

function playAll(){

audioTracks.forEach(a=>a.play())
wavesurfer.play()

setActive("playBtn")

}

function pauseAll(){

audioTracks.forEach(a=>a.pause())
wavesurfer.pause()

setActive("pauseBtn")

}

function stopAll(){

audioTracks.forEach(a=>{

a.pause()
a.currentTime=0

})

wavesurfer.stop()

setActive("stopBtn")

}

document.getElementById("playBtn").onclick=playAll
document.getElementById("pauseBtn").onclick=pauseAll
document.getElementById("stopBtn").onclick=stopAll

function toggleSolo(i){

if(soloIndex===i){

audioTracks.forEach(a=>a.volume=1)

document.querySelectorAll("[id^='solo']")
.forEach(b=>b.classList.remove("active"))

soloIndex=null

document.getElementById("waveform").classList.remove("highlight")

}else{

audioTracks.forEach((a,index)=>{

a.volume=index===i?1:0

})

document.querySelectorAll("[id^='solo']")
.forEach(b=>b.classList.remove("active"))

document.getElementById("solo"+i).classList.add("active")

soloIndex=i

document.getElementById("waveform").classList.add("highlight")

}

}

function toggleMute(i){

const btn=document.getElementById("mute"+i)
const a=audioTracks[i]

if(a.volume>0){

a.volume=0
btn.classList.add("active")

}else{

a.volume=1
btn.classList.remove("active")

}

}

function setActive(id){

document.querySelectorAll("#playBtn,#pauseBtn,#stopBtn")
.forEach(b=>b.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

</script>

</body>
</html>
