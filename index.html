<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multitrack Player</title>

<script src="https://unpkg.com/wavesurfer.js@6"></script>

<style>

body{
font-family:Arial;
max-width:1100px;
margin:auto;
padding:40px;
}

.wave{
height:200px;
}

.track{
margin-bottom:35px;
}

.controls{
display:flex;
gap:10px;
align-items:center;
margin-bottom:8px;
}

button{
padding:7px 14px;
cursor:pointer;
border:none;
background:#ddd;
}

button.active{
background:#222;
color:white;
}

.volume{
width:150px;
}

</style>
</head>

<body>

<h2>Multitrack Player</h2>

<div class="controls">

<button id="playBtn">Play</button>
<button id="pauseBtn">Pause</button>
<button id="stopBtn">Stop</button>

</div>

<div id="tracks"></div>

<script>

const tracks=[

{file:"drums.mp3"},
{file:"Click.mp3"},
{file:"Cues.mp3"},
{file:"guitar.mp3"},
{file:"Ag2.mp3"}

]

let players=[]
let soloIndex=null

tracks.forEach((track,i)=>{

const name=track.file.replace(".mp3","")

const type=(name.toLowerCase()=="click" || name.toLowerCase()=="cues")
? "click"
: "instrument"

const color= type==="click" ? "#ff5555" : "#4aa3ff"

const div=document.createElement("div")
div.className="track"

div.innerHTML=`

<h4>${name}</h4>

<div class="controls">

<button id="solo${i}">Solo</button>
<button id="mute${i}">Mute</button>

<label>Vol</label>
<input type="range" min="0" max="1" step="0.01"
value="1" class="volume" id="vol${i}">

</div>

<div id="wave${i}" class="wave"></div>

`

document.getElementById("tracks").appendChild(div)

const ws=WaveSurfer.create({

container:"#wave"+i,
backend:"MediaElement",
waveColor:color,
progressColor:"#000",
height:200

})

ws.load(track.file)

players.push(ws)

ws.on("seek",(progress)=>{

if(soloIndex!==null){

players[soloIndex].seekTo(progress)

}else{

players.forEach(p=>p.seekTo(progress))

}

})

document.getElementById("solo"+i).onclick=()=>toggleSolo(i)
document.getElementById("mute"+i).onclick=()=>toggleMute(i)

document.getElementById("vol"+i).oninput=(e)=>{

ws.setVolume(e.target.value)

}

})

function playAll(){

players.forEach(p=>p.play())

setActive("playBtn")

}

function pauseAll(){

players.forEach(p=>p.pause())

setActive("pauseBtn")

}

function stopAll(){

players.forEach(p=>{
p.pause()
p.seekTo(0)
})

setActive("stopBtn")

}

function setActive(id){

document.querySelectorAll("#playBtn,#pauseBtn,#stopBtn")
.forEach(b=>b.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

document.getElementById("playBtn").onclick=playAll
document.getElementById("pauseBtn").onclick=pauseAll
document.getElementById("stopBtn").onclick=stopAll

function toggleSolo(i){

const button=document.getElementById("solo"+i)

if(soloIndex===i){

players.forEach(p=>p.setVolume(1))
button.classList.remove("active")
soloIndex=null

}else{

players.forEach((p,index)=>{

p.setVolume(index===i?1:0)

})

document.querySelectorAll("[id^='solo']")
.forEach(b=>b.classList.remove("active"))

button.classList.add("active")

soloIndex=i

}

}

function toggleMute(i){

const button=document.getElementById("mute"+i)
const ws=players[i]

if(ws.getVolume()>0){

ws.setVolume(0)
button.classList.add("active")

}else{

ws.setVolume(1)
button.classList.remove("active")

}

}

</script>

</body>
</html>
