<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Multitrack Player</title>

<script src="https://unpkg.com/wavesurfer.js@6"></script>

<style>

body{
font-family: Arial;
max-width:900px;
margin:auto;
padding:40px;
}

.track{
margin-bottom:30px;
}

.wave{
border:1px solid #ddd;
}

button{
margin-right:10px;
margin-bottom:5px;
}

</style>

</head>

<body>

<h2>Multitrack Player</h2>

<button onclick="playAll()">Play</button>
<button onclick="pauseAll()">Pause</button>

<div id="tracks"></div>

<script>

const tracks = [

{ name:"Drums", file:"drums.mp3" },
{ name:"Click", file:"Click.mp3" },
{ name:"Cues", file:"Cues.mp3" },
{ name:"Guitar", file:"guitar.mp3" },
{ name:"AG2", file:"Ag2.mp3" }

]

let players = []

tracks.forEach((track,i)=>{

const container=document.createElement("div")
container.className="track"

container.innerHTML=`
<h4>${track.name}</h4>
<button onclick="solo(${i})">Solo</button>
<button onclick="mute(${i})">Mute</button>
<div id="wave${i}" class="wave"></div>
`

document.getElementById("tracks").appendChild(container)

const ws=WaveSurfer.create({

container:"#wave"+i,
waveColor:"#999",
progressColor:"#000",
height:80,
responsive:true

})

ws.load(track.file)

players.push(ws)

})

function playAll(){

players.forEach(p=>{
p.play()
})

}

function pauseAll(){

players.forEach(p=>{
p.pause()
})

}

function mute(i){

players[i].setVolume(0)

}

function solo(i){

players.forEach((p,index)=>{

if(index===i){
p.setVolume(1)
}else{
p.setVolume(0)
}

})

}

</script>

</body>

</html>
