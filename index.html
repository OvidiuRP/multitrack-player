<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multitrack Player</title>

<script src="https://unpkg.com/wavesurfer.js@6"></script>

<style>

body{
font-family:Arial;
max-width:1200px;
margin:auto;
padding:40px;
}

#transport button{
padding:6px 14px;
margin-right:8px;
cursor:pointer;
}

#transport button.active{
background:#222;
color:white;
}

#waveform{
height:180px;
border:3px solid #999;
margin-top:20px;
margin-bottom:30px;
}

#mixer{
display:flex;
gap:10px;
overflow-x:auto;
}

.channel{
border:2px solid #ccc;
padding:8px;
width:70px;
text-align:center;
font-size:12px;
}

.channel.active{
border-color:#ff8800;
}

.channel button{
font-size:11px;
margin:2px;
padding:2px 6px;
}

.channel button.active{
background:#222;
color:white;
}

.fader{
writing-mode: bt-lr;
-webkit-appearance: slider-vertical;
height:80px;
width:18px;
margin-top:6px;
}

</style>
</head>

<body>

<h2>Multitrack Player</h2>

<div id="transport">
<button id="playBtn">Play</button>
<button id="pauseBtn">Pause</button>
<button id="stopBtn">Stop</button>
</div>

<div id="waveform"></div>

<div id="mixer"></div>

<script>

const trackFiles=[
"Click.mp3",
"Cues.mp3",
"Ag2.mp3",
"drums.mp3",
"guitar.mp3"
]

function sortTracks(list){

let click=list.filter(f=>f.toLowerCase().startsWith("click"))
let cues=list.filter(f=>f.toLowerCase().startsWith("cues"))

let rest=list.filter(f=>
!f.toLowerCase().startsWith("click") &&
!f.toLowerCase().startsWith("cues")
)

rest.sort()

return [...click,...cues,...rest]

}

const tracks=sortTracks(trackFiles)

let audioTracks=[]
let soloIndex=null

const wavesurfer=WaveSurfer.create({

container:"#waveform",
backend:"MediaElement",
waveColor:"#4aa3ff",
progressColor:"#000",
height:180

})

wavesurfer.load(tracks[0])

tracks.forEach((file,i)=>{

const name=file.replace(".mp3","")

const audio=new Audio(file)

audioTracks.push(audio)

const div=document.createElement("div")
div.className="channel"

div.innerHTML=`

<div>${name}</div>

<button id="mute${i}">Mute</button>
<button id="solo${i}">Solo</button>

<input type="range" min="0" max="1" step="0.01" value="1"
class="fader" id="vol${i}">

`

document.getElementById("mixer").appendChild(div)

document.getElementById("mute"+i).onclick=()=>toggleMute(i)
document.getElementById("solo"+i).onclick=()=>toggleSolo(i)

document.getElementById("vol"+i).oninput=(e)=>{

audio.volume=e.target.value

}

})

wavesurfer.on("seek",(progress)=>{

const time=wavesurfer.getDuration()*progress

audioTracks.forEach(a=>{
a.currentTime=time
})

})

function playAll(){

audioTracks.forEach(a=>a.play())
wavesurfer.play()

setActive("playBtn")

}

function pauseAll(){

audioTracks.forEach(a=>a.pause())
wavesurfer.pause()

setActive("pauseBtn")

}

function stopAll(){

audioTracks.forEach(a=>{
a.pause()
a.currentTime=0
})

wavesurfer.stop()
wavesurfer.seekTo(0)

setActive("stopBtn")

}

document.getElementById("playBtn").onclick=playAll
document.getElementById("pauseBtn").onclick=pauseAll
document.getElementById("stopBtn").onclick=stopAll

function toggleSolo(i){

if(soloIndex===i){

audioTracks.forEach(a=>a.volume=1)

document.querySelectorAll(".channel")
.forEach(c=>c.classList.remove("active"))

document.querySelectorAll("[id^='solo']")
.forEach(b=>b.classList.remove("active"))

soloIndex=null

}else{

audioTracks.forEach((a,index)=>{
a.volume=index===i?1:0
})

document.querySelectorAll(".channel")
.forEach(c=>c.classList.remove("active"))

document.querySelectorAll("[id^='solo']")
.forEach(b=>b.classList.remove("active"))

document.getElementById("solo"+i).classList.add("active")

document.getElementById("mixer").children[i]
.classList.add("active")

soloIndex=i

}

}

function toggleMute(i){

const btn=document.getElementById("mute"+i)
const a=audioTracks[i]

if(a.volume>0){

a.volume=0
btn.classList.add("active")

}else{

a.volume=1
btn.classList.remove("active")

}

}

function setActive(id){

document.querySelectorAll("#transport button")
.forEach(b=>b.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

</script>

</body>
</html>
