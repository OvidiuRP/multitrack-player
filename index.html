<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Multitrack Check</title>

<script src="https://unpkg.com/wavesurfer.js@6"></script>

<style>

body{
font-family:Arial;
background:#dcdcdc;
max-width:1200px;
margin:auto;
padding:30px;
}

#header{
text-align:center;
}

#topbar{
display:flex;
justify-content:center;
gap:50px;
align-items:center;
}

#transport button{
padding:8px 16px;
margin:5px;
}

#waveform{
height:180px;
border:3px solid #555;
background:#eee;
margin-top:20px;
}

#mixer{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:25px;
}

.channel{
border:2px solid #4a7bd6;
width:90px;
padding:8px;
text-align:center;
background:#f5f5f5;
}

.channel.click{
border-color:#d64040;
}

.channel.solo{
border-color:#ff8800;
}

.fader{
appearance:none;
height:120px;
width:28px;
writing-mode:bt-lr;
}

.scale{
font-size:10px;
}

.buttons{
display:flex;
justify-content:center;
gap:4px;
margin-top:6px;
}

</style>
</head>

<body>

<div id="header">

<h2>Multitrack Check</h2>

<div id="topbar">

<div id="transport">
<button id="play">Play</button>
<button id="pause">Pause</button>
<button id="stop">Stop</button>
</div>

<div>

Master<br>
<input type="range" id="master" min="0" max="1" step="0.01" value="1">

</div>

</div>

</div>

<div id="waveform"></div>

<div id="mixer"></div>

<script>

const ctx = new AudioContext()

let tracks=[]
let gainNodes=[]
let sources=[]
let buffers=[]
let isPlaying=false
let startTime=0
let pauseOffset=0

const wave = WaveSurfer.create({

container:"#waveform",
waveColor:"#7fa9ff",
progressColor:"#222",
height:180

})

async function loadTracks(){

const res=await fetch("tracks.json")

tracks=await res.json()

for(let i=0;i<tracks.length;i++){

const response=await fetch("audio/"+tracks[i])

const arrayBuffer=await response.arrayBuffer()

const buffer=await ctx.decodeAudioData(arrayBuffer)

buffers.push(buffer)

const gain=ctx.createGain()

gain.connect(ctx.destination)

gainNodes.push(gain)

createChannel(tracks[i],i)

}

wave.load("audio/"+tracks[0])

}

function createChannel(name,i){

const div=document.createElement("div")

div.className="channel"

if(name.toLowerCase().includes("click") || name.toLowerCase().includes("cues")){
div.classList.add("click")
}

div.innerHTML=`

<div>${name}</div>

<div class="scale">
100%<br>
75%<br>
50%<br>
25%<br>
0%
</div>

<input type="range" class="fader" min="0" max="1" step="0.01" value="1" id="vol${i}">

<div class="buttons">
<button id="mute${i}">M</button>
<button id="solo${i}">S</button>
</div>

`

document.getElementById("mixer").appendChild(div)

document.getElementById("vol"+i).oninput=e=>{

gainNodes[i].gain.value=e.target.value

}

document.getElementById("mute"+i).onclick=()=>{

gainNodes[i].gain.value=0

}

document.getElementById("solo"+i).onclick=()=>{

gainNodes.forEach((g,index)=>{

g.gain.value=index===i?1:0

})

}

}

function play(){

sources=[]

for(let i=0;i<buffers.length;i++){

const src=ctx.createBufferSource()

src.buffer=buffers[i]

src.connect(gainNodes[i])

src.start(0,pauseOffset)

sources.push(src)

}

startTime=ctx.currentTime-pauseOffset

isPlaying=true

wave.play()

}

function pause(){

sources.forEach(s=>s.stop())

pauseOffset=ctx.currentTime-startTime

isPlaying=false

wave.pause()

}

function stop(){

sources.forEach(s=>s.stop())

pauseOffset=0

isPlaying=false

wave.stop()

}

document.getElementById("play").onclick=play
document.getElementById("pause").onclick=pause
document.getElementById("stop").onclick=stop

document.addEventListener("keydown",e=>{

if(e.code==="Space"){

e.preventDefault()

if(isPlaying){
pause()
}else{
play()
}

}

if(e.code==="Enter"){

if(isPlaying){

pauseOffset=0
play()

}else{

pauseOffset=0
wave.seekTo(0)

}

}

})

loadTracks()

</script>

</body>
</html>
