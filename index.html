<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multitrack Player Avansat</title>
<script src="https://unpkg.com/wavesurfer.js@6"></script>

<style>
body{
  font-family: Arial;
  max-width:900px;
  margin:auto;
  padding:40px;
}

.track{
  margin-bottom:30px;
  height:80px;       /* container fix */
  overflow:hidden;   /* ascunde waveform overflow */
}

.wave{
  height:120px;      /* waveform mare */
}

button{
  margin-right:10px;
  margin-bottom:5px;
}
</style>
</head>

<body>
<h2>Multitrack Player</h2>

<button onclick="playAll()">Play</button>
<button onclick="pauseAll()">Pause</button>

<div id="tracks"></div>

<script>
// Lista track-urilor
const tracks = [
  { names:["Drums"], file:"drums.mp3", category:"instrument" },
  { names:["Click"], file:"click.mp3", category:"click" },
  { names:["Cues"], file:"cues.mp3", category:"click" },
  { names:["Guitar","Eg1","Eg2","Acoustic","Electric","Ag1","Ag2"], file:"guitar.mp3", category:"instrument" },
  { names:["AG2"], file:"ag2.mp3", category:"instrument" }
];

let players = [];
let soloActive = null;

tracks.forEach((track, i) => {
  const container = document.createElement("div");
  container.className = "track";

  container.innerHTML = `
    <h4>${track.names[0]}</h4>
    <button id="solo${i}">Solo</button>
    <button id="mute${i}">Mute</button>
    <div id="wave${i}" class="wave"></div>
  `;

  document.getElementById("tracks").appendChild(container);

  // culoare per categorie
  const waveColor = (track.category==="click") ? "#FF5555" : "#55AAFF";

  // creare WaveSurfer
  const ws = WaveSurfer.create({
    container: "#wave"+i,
    waveColor: waveColor,
    progressColor: "#000",
    height:120,
    responsive:true
  });

  // încarcă fișierul
  ws.load(track.file);

  // păstrăm instanța
  players.push(ws);

  // legare butoane Solo / Mute
  document.getElementById("solo"+i).addEventListener("click", ()=>{
    if(soloActive===i){
      // deja solo → revenim la normal
      players.forEach(p=>p.setVolume(1));
      soloActive = null;
    } else {
      players.forEach((p,index)=>{
        p.setVolume(index===i ? 1 : 0);
      });
      soloActive = i;
    }
  });

  document.getElementById("mute"+i).addEventListener("click", ()=>{
    ws.setVolume(0);
  });

});

// Play / Pause globale
function playAll(){ players.forEach(p=>p.play()); }
function pauseAll(){ players.forEach(p=>p.pause()); }
</script>

</body>
</html>
