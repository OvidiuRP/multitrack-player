<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multitrack Player</title>

<script src="https://unpkg.com/wavesurfer.js@6"></script>

<style>

body{
font-family:Arial;
max-width:1100px;
margin:auto;
padding:40px;
}

.wave{
height:180px;
}

.controls{
display:flex;
gap:10px;
align-items:center;
margin-bottom:5px;
}

button{
padding:6px 12px;
cursor:pointer;
}

button.active{
background:#222;
color:white;
}

.track{
margin-bottom:35px;
}

.volume{
width:150px;
}

</style>
</head>

<body>

<h2>Multitrack Player</h2>

<button onclick="playAll()">Play</button>
<button onclick="pauseAll()">Pause</button>
<button onclick="stopAll()">Stop</button>

<div id="tracks"></div>

<script>

let players=[]
let soloIndex=null

fetch("tracks.json")
.then(res=>res.json())
.then(data=>{

data.tracks.forEach((file,i)=>{

let name=file.replace(".mp3","")

let type=(name.toLowerCase()=="click" || name.toLowerCase()=="cues")
? "click"
: "instrument"

const color= type==="click" ? "#ff5555" : "#4aa3ff"

const div=document.createElement("div")
div.className="track"

div.innerHTML=`

<h4>${name}</h4>

<div class="controls">

<button id="solo${i}">Solo</button>
<button id="mute${i}">Mute</button>

<label>Vol</label>
<input type="range" min="0" max="1" step="0.01" value="1"
class="volume" id="vol${i}">

</div>

<div id="wave${i}" class="wave"></div>

`

document.getElementById("tracks").appendChild(div)

const ws=WaveSurfer.create({

container:"#wave"+i,
backend:"MediaElement",
waveColor:color,
progressColor:"#000",
height:180

})

ws.load(file)

players.push(ws)

ws.on("seek",(progress)=>{

if(soloIndex!==null){

if(players.indexOf(ws)===soloIndex){

players[soloIndex].seekTo(progress)

}

}else{

players.forEach(p=>p.seekTo(progress))

}

})

document.getElementById("solo"+i).onclick=()=>toggleSolo(i)
document.getElementById("mute"+i).onclick=()=>toggleMute(i)

document.getElementById("vol"+i).oninput=(e)=>{

ws.setVolume(e.target.value)

}

})

})

function playAll(){

players.forEach(p=>p.play())

}

function pauseAll(){

players.forEach(p=>p.pause())

}

function stopAll(){

players.forEach(p=>{
p.pause()
p.seekTo(0)
})

}

function toggleSolo(i){

const button=document.getElementById("solo"+i)

if(soloIndex===i){

players.forEach(p=>p.setVolume(1))
button.classList.remove("active")
soloIndex=null

}else{

players.forEach((p,index)=>{

p.setVolume(index===i?1:0)

})

document.querySelectorAll("[id^='solo']")
.forEach(b=>b.classList.remove("active"))

button.classList.add("active")

soloIndex=i

}

}

function toggleMute(i){

const button=document.getElementById("mute"+i)

const ws=players[i]

if(ws.getVolume()>0){

ws.setVolume(0)
button.classList.add("active")

}else{

ws.setVolume(1)
button.classList.remove("active")

}

}

</script>

</body>
</html>
