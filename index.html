<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multitrack Check</title>

<script src="https://unpkg.com/wavesurfer.js"></script>

<style>

body{
font-family:Arial;
background:#353535;
color:white;
text-align:center;
}

.topbar{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
margin-top:20px;
}

.transport button{
padding:10px 16px;
margin:4px;
border:none;
border-radius:6px;
font-size:14px;
cursor:pointer;
}

#play{background:#2ecc71}
#pause{background:#f1c40f}
#stop{background:#e74c3c}

.master{
width:200px;
}

#waveform{
width:90%;
height:140px;
margin:25px auto;
background:#444;
border-radius:6px;
}

.tracks{
width:90%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
gap:10px;
}

.track{
background:#3f6db5;
border-radius:6px;
padding:6px;
display:flex;
flex-direction:column;
align-items:center;
}

.track.click{
background:#a52a2a;
}

.track.solo{
outline:3px solid orange;
}

.track-name{
font-size:11px;
margin-bottom:5px;
}

.fader{
writing-mode:bt-lr;
-webkit-appearance: slider-vertical;
height:90px;
margin-bottom:6px;
}

.controls{
display:flex;
gap:6px;
}

.controls button{
font-size:10px;
padding:3px 6px;
border:none;
border-radius:4px;
cursor:pointer;
}

.mute.active{background:red}
.solo.active{background:orange}

</style>
</head>

<body>

<h1>Multitrack Check</h1>

<div class="topbar">

<div class="transport">
<button id="play">Play</button>
<button id="pause">Pause</button>
<button id="stop">Stop</button>
</div>

<div class="master">
Master Volume
<input id="masterVolume" type="range" min="0" max="1" step="0.01" value="1">
</div>

</div>

<div id="waveform"></div>

<div class="tracks" id="tracks"></div>

<script>

const ctx = new AudioContext()
const masterGain = ctx.createGain()
masterGain.connect(ctx.destination)

let buffers=[]
let sources=[]
let gains=[]
let states=[]

let startTime=0
let pauseOffset=0
let playing=false

const wavesurfer = WaveSurfer.create({
container:"#waveform",
waveColor:"#888",
progressColor:"#fff",
cursorColor:"#fff",
height:120
})

fetch("tracks.json")
.then(r=>r.json())
.then(loadTracks)

async function loadTracks(list){

const container=document.getElementById("tracks")

for(let i=0;i<list.length;i++){

let file=list[i]
let name=file.replace(".mp3","")

let res=await fetch("audio/"+file)
let arr=await res.arrayBuffer()
let buf=await ctx.decodeAudioData(arr)

buffers.push(buf)

let gain=ctx.createGain()
gain.connect(masterGain)

gains.push(gain)

states.push({
volume:1,
mute:false,
solo:false
})

if(i==0) wavesurfer.load("audio/"+file)

let div=document.createElement("div")
div.className="track"

if(name.toLowerCase().includes("click")||name.toLowerCase().includes("cues")){
div.classList.add("click")
}

div.innerHTML=`
<div class="track-name">${name}</div>
<input class="fader" type="range" min="0" max="1" step="0.01" value="1">
<div class="controls">
<button class="mute">M</button>
<button class="solo">S</button>
</div>
`

container.appendChild(div)

let fader=div.querySelector(".fader")
let mute=div.querySelector(".mute")
let solo=div.querySelector(".solo")

fader.oninput=e=>{
states[i].volume=e.target.value
updateMix()
}

mute.onclick=()=>{
states[i].mute=!states[i].mute
mute.classList.toggle("active")
updateMix()
}

solo.onclick=()=>{
states[i].solo=!states[i].solo
solo.classList.toggle("active")
div.classList.toggle("solo")
updateMix()
}

}

}

function startSources(offset){

sources=[]

for(let i=0;i<buffers.length;i++){

let src=ctx.createBufferSource()
src.buffer=buffers[i]
src.connect(gains[i])

src.start(0,offset)

sources.push(src)

}

}

function play(){

if(playing) return

startSources(pauseOffset)

startTime=ctx.currentTime-pauseOffset
wavesurfer.play(pauseOffset)

playing=true
}

function pause(){

if(!playing) return

sources.forEach(s=>s.stop())

pauseOffset=ctx.currentTime-startTime
wavesurfer.pause()

playing=false
}

function stop(){

sources.forEach(s=>s.stop())

pauseOffset=0
wavesurfer.stop()

playing=false
}

function updateMix(){

let soloActive=states.some(s=>s.solo)

states.forEach((s,i)=>{

let vol=s.volume

if(s.mute) vol=0

if(soloActive && !s.solo) vol=0

gains[i].gain.value=vol

})

}

document.getElementById("play").onclick=play
document.getElementById("pause").onclick=pause
document.getElementById("stop").onclick=stop

document.getElementById("masterVolume").oninput=e=>{
masterGain.gain.value=e.target.value
}

document.addEventListener("keydown",e=>{

if(e.code==="Space"){
e.preventDefault()
playing?pause():play()
}

if(e.code==="Enter"){

if(playing){
stop()
play()
}else{
stop()
}

}

})

</script>

</body>
</html>
